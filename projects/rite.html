<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>rite</title>

  <script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  <script>
    const pdfjsLib = window.pdfjsLib;
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js";
  </script>

  <style>
    body { margin:0; background:#111; display:flex; justify-content:center; }
    #viewer { margin-top:20px; }
    canvas { display:block; margin-bottom:20px; background:white; }
  </style>
</head>
<body>

<div id="viewer"></div>

<!-- Off-screen staging area -->
<div id="staging" style="position:fixed; left:-99999px; top:0; visibility:hidden;"></div>

<script>
const PDF_URL = "https://cool-union-6c4a.rynmurdock.workers.dev/";

let lastModified = null;
let rendering = false;

async function renderToContainer(container) {
  const pdf = await pdfjsLib.getDocument(PDF_URL + "?t=" + Date.now()).promise;
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const viewport = page.getViewport({ scale: window.devicePixelRatio * 1.2 });

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = viewport.width;
    canvas.height = viewport.height;

    // CSS size stays at logical pixels
    canvas.style.width = (viewport.width / window.devicePixelRatio) + "px";
    canvas.style.height = (viewport.height / window.devicePixelRatio) + "px";
    container.appendChild(canvas);

    await page.render({ canvasContext: ctx, viewport }).promise;
  }
}

let paused = false;

function togglePause() {
    paused = !paused;
    document.getElementById("pauseBtn").textContent = paused ? "▶ Resume" : "⏸ Pause";
}

async function updatePDF() {
  if (rendering || paused) return;
  rendering = true;

  const staging = document.getElementById("staging");
  const viewer = document.getElementById("viewer");

  const newContent = document.createElement("div");
  staging.appendChild(newContent);

  try {
    await renderToContainer(newContent);

    // Fully rendered off-screen — now swap instantly
    requestAnimationFrame(() => {
      viewer.innerHTML = "";
      while (newContent.firstChild) {
        viewer.appendChild(newContent.firstChild);
      }
      newContent.remove();
    });

  } catch (e) {
    console.error("Render failed:", e);
    newContent.remove();
  }

  rendering = false;
}

async function checkForUpdate() {
  const res = await fetch(PDF_URL, { method: "HEAD", cache: "no-store" });
  const newModified = res.headers.get("Last-Modified");

  if (!lastModified || newModified !== lastModified) {
    lastModified = newModified;
    await updatePDF();
  }
}

updatePDF();
setInterval(updatePDF, 1000);
</script>

<button id="pauseBtn" onclick="togglePause()" style="
    position:fixed;
    top:20px;
    right:20px;
    padding:8px 16px;
    background:#333;
    color:#fff;
    border:none;
    cursor:pointer;
    font-size:14px;
">⏸ Pause</button>

</body>
</html>
