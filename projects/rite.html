<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Rite</title>
  <script src="https://raw.githubusercontent.com/rynmurdock/text-watch-rite-tex/refs/heads/main/text.pdf"></script>

  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
    }

    #viewer {
      margin-top: 20px;
    }

    canvas {
      display: block;
      margin-bottom: 20px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
      background: white;
    }
  </style>
</head>
<body>

<div id="viewer"></div>

<script>
const PDF_URL = "https://raw.githubusercontent.com/<YOUR_USERNAME>/<YOUR_REPO>/main/doc.pdf";

let lastModified = null;
let pdfDoc = null;

async function renderPDF() {
  try {
    const loadingTask = pdfjsLib.getDocument(PDF_URL + "?t=" + Date.now());
    pdfDoc = await loadingTask.promise;

    const viewer = document.getElementById("viewer");
    viewer.innerHTML = "";

    for (let pageNum = 1; pageNum <= pdfDoc.numPages; pageNum++) {
      const page = await pdfDoc.getPage(pageNum);
      const viewport = page.getViewport({ scale: 1.5 });

      const canvas = document.createElement("canvas");
      const context = canvas.getContext("2d");

      canvas.width = viewport.width;
      canvas.height = viewport.height;

      viewer.appendChild(canvas);

      await page.render({
        canvasContext: context,
        viewport: viewport
      }).promise;
    }

    console.log("PDF rendered");
  } catch (err) {
    console.error("Render error:", err);
  }
}

async function checkForUpdate() {
  try {
    const res = await fetch(PDF_URL, { method: "HEAD" });
    const newModified = res.headers.get("Last-Modified");

    if (!lastModified || newModified !== lastModified) {
      lastModified = newModified;
      console.log("PDF updated, reloading...");
      renderPDF();
    }
  } catch (err) {
    console.error("HEAD check failed:", err);
  }
}

// initial load
renderPDF();

// check every 2 seconds
setInterval(checkForUpdate, 2000);
</script>

</body>
</html>
